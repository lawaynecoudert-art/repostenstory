<!DOCTYPE html>
<html>
<head>
  <title>Apply Financial Migration</title>
</head>
<body>
  <h1>Applying Financial Migration...</h1>
  <div id="result"></div>

  <script type="module">
    const SUPABASE_URL = 'https://gpwwvcgxdoalkpbrulaz.supabase.co';
    const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdwd3d2Y2d4ZG9hbGtwYnJ1bGF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjYzMDYsImV4cCI6MjA4NzgwMjMwNn0.Q7UIMNeqsg6T1eey4aQ1YCcu_iuAaO8AeXGLaJzYv4Q';

    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);

    async function applyMigration() {
      try {
        const { data, error } = await supabase.rpc('exec_sql', {
          sql: `
            CREATE TABLE IF NOT EXISTS monthly_financials (
              id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
              user_id uuid REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,
              month date NOT NULL,
              amazon_stock_value numeric(10,2) DEFAULT 0,
              pending_stock_value numeric(10,2) DEFAULT 0,
              amazon_funds numeric(10,2) DEFAULT 0,
              bank_funds numeric(10,2) DEFAULT 0,
              supplier_credits numeric(10,2) DEFAULT 0,
              revenue numeric(10,2) DEFAULT 0,
              profit numeric(10,2) DEFAULT 0,
              notes text,
              created_at timestamptz DEFAULT now(),
              updated_at timestamptz DEFAULT now(),
              UNIQUE(user_id, month)
            );

            CREATE INDEX IF NOT EXISTS idx_monthly_financials_user_month
              ON monthly_financials(user_id, month DESC);

            ALTER TABLE monthly_financials ENABLE ROW LEVEL SECURITY;

            DROP POLICY IF EXISTS "Users can view own financial data" ON monthly_financials;
            CREATE POLICY "Users can view own financial data"
              ON monthly_financials
              FOR SELECT
              TO authenticated
              USING (auth.uid() = user_id);

            DROP POLICY IF EXISTS "Users can insert own financial data" ON monthly_financials;
            CREATE POLICY "Users can insert own financial data"
              ON monthly_financials
              FOR INSERT
              TO authenticated
              WITH CHECK (auth.uid() = user_id);

            DROP POLICY IF EXISTS "Users can update own financial data" ON monthly_financials;
            CREATE POLICY "Users can update own financial data"
              ON monthly_financials
              FOR UPDATE
              TO authenticated
              USING (auth.uid() = user_id)
              WITH CHECK (auth.uid() = user_id);

            DROP POLICY IF EXISTS "Users can delete own financial data" ON monthly_financials;
            CREATE POLICY "Users can delete own financial data"
              ON monthly_financials
              FOR DELETE
              TO authenticated
              USING (auth.uid() = user_id);
          `
        });

        if (error) {
          document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
          console.error('Migration error:', error);
        } else {
          document.getElementById('result').innerHTML = '<p style="color: green;">Migration applied successfully!</p>';
          console.log('Migration success:', data);
        }
      } catch (err) {
        document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + err.message + '</p>';
        console.error('Error:', err);
      }
    }

    applyMigration();
  </script>
</body>
</html>
